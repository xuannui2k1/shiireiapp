<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>仕入入力アプリ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

header { background: #1a3a5c; color: white; padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
header h1 { font-size: 17px; font-weight: 700; }
header p { font-size: 11px; opacity: 0.7; margin-top: 3px; }

/* SETUP */
#setup-screen { padding: 20px 16px; }
.setup-card { background: white; border-radius: 12px; padding: 20px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.setup-card h2 { font-size: 15px; font-weight: 700; color: #1a3a5c; margin-bottom: 16px; border-bottom: 2px solid #e8f0fb; padding-bottom: 10px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: 700; }
.form-group input { width: 100%; padding: 11px 12px; border: 1.5px solid #dde3ee; border-radius: 8px; font-size: 13px; font-family: inherit; color: #1a1a1a; }
.form-group input:focus { outline: none; border-color: #1a3a5c; }
.hint { font-size: 11px; color: #999; margin-top: 4px; line-height: 1.5; }
.btn-primary { width: 100%; padding: 13px; background: #1a3a5c; color: white; border: none; border-radius: 9px; font-size: 15px; font-weight: 700; font-family: inherit; margin-top: 6px; cursor: pointer; }
.btn-primary:active { background: #122a45; }

/* MAIN */
#main-screen { display: none; }
.top-bar { background: white; border-bottom: 1px solid #e0e6f0; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
.top-bar .left .sheet-name { font-size: 14px; font-weight: 700; color: #1a3a5c; }
.top-bar .left .sheet-date { font-size: 11px; color: #999; margin-top: 2px; }
.btn-reload { font-size: 12px; color: #1a3a5c; background: #e8f0fb; border: 1px solid #b3cce8; border-radius: 6px; padding: 6px 12px; font-family: inherit; font-weight: 700; cursor: pointer; }

.tabs { display: flex; background: white; border-bottom: 2px solid #e0e6f0; }
.tab-btn { flex: 1; padding: 12px 8px; font-size: 15px; font-weight: 700; color: #aaa; background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: inherit; cursor: pointer; }
.tab-btn.active { color: #1a3a5c; border-bottom-color: #1a3a5c; }

.fish-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

/* FISH CARD */
.fish-card { background: white; border-radius: 12px; border: 1.5px solid #e0e6f0; overflow: hidden; }
.fish-card.has-filled { border-color: #81c784; }

.fish-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; user-select: none; }
.fish-info .fish-name { font-size: 16px; font-weight: 700; }
.fish-info .fish-summary { font-size: 12px; color: #888; margin-top: 3px; }
.fish-arrow { font-size: 12px; color: #ccc; transition: transform 0.2s; }
.fish-arrow.open { transform: rotate(180deg); }

.fish-body { display: none; border-top: 1.5px solid #f0f4f8; }
.fish-body.open { display: block; }

/* STORE LIST */
.store-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
.store-row { background: #f8f9fb; border: 1.5px solid #e8edf5; border-radius: 10px; overflow: hidden; }
.store-row.filled { border-color: #81c784; background: #f0faf0; }

.store-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; cursor: pointer; }
.store-name-text { font-size: 14px; font-weight: 600; color: #1a3a5c; }
.store-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 12px; }
.badge-empty { background: #f0f0f0; color: #aaa; }
.badge-filled { background: #e8f5e9; color: #2e7d32; }

.store-input-area { display: none; border-top: 1px solid #e0e8f0; padding: 12px 14px; background: white; }
.store-input-area.open { display: block; }

.input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: #888; font-weight: 700; }
.field input { padding: 9px 10px; border: 1.5px solid #dde3ee; border-radius: 8px; font-size: 17px; font-family: inherit; color: #1a1a1a; width: 100%; text-align: right; }
.field input:focus { outline: none; border-color: #1a3a5c; background: #f5f8ff; }
.field input.auto-field { background: #eaf3ff; color: #1a3a5c; font-weight: 700; border-color: #b3cce8; }

.btn-save { width: 100%; padding: 11px; background: #1a3a5c; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-save:active { background: #122a45; }
.btn-save:disabled { background: #bbb; }
.save-msg { text-align: center; font-size: 12px; margin-top: 7px; min-height: 16px; font-weight: 600; }
.save-msg.ok { color: #2e7d32; }
.save-msg.err { color: #c62828; }

.settings-link { text-align: center; padding: 16px; }
.settings-link a { font-size: 12px; color: #aaa; text-decoration: underline; cursor: pointer; }

/* LOADING */
#loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 999; }
#loading-overlay.show { display: flex; }
.spinner-box { background: white; border-radius: 14px; padding: 28px 36px; text-align: center; }
.spinner { width: 36px; height: 36px; border: 3px solid #e0e6f0; border-top-color: #1a3a5c; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-box p { font-size: 13px; color: #555; font-weight: 600; }

/* TOAST */
#toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: #1a3a5c; color: white; padding: 10px 22px; border-radius: 22px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.25s; z-index: 1000; white-space: nowrap; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>仕入入力アプリ</h1>
  <p id="header-sub">スプレッドシートへ直接入力</p>
</header>

<!-- SETUP -->
<div id="setup-screen">
  <div class="setup-card">
    <h2>&#9881; 初期設定</h2>
    <div class="form-group">
      <label>スプレッドシートID</label>
      <input type="text" id="input-sheet-id" placeholder="1GdFXOjjHpLJz...">
      <div class="hint">URLの /d/ と /edit の間の文字列</div>
    </div>
    <div class="form-group">
      <label>GASウェブアプリURL</label>
      <input type="text" id="input-gas-url" placeholder="https://script.google.com/macros/s/...">
    </div>
    <button class="btn-primary" onclick="saveSetup()">設定を保存して開始 →</button>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div class="top-bar">
    <div class="left">
      <div class="sheet-name" id="current-sheet-name">読み込み中...</div>
      <div class="sheet-date" id="current-date"></div>
    </div>
    <button class="btn-reload" onclick="loadSheetData()">&#8635; 再読込</button>
  </div>
  <div class="tabs" id="tabs-container"></div>
  <div class="fish-list" id="fish-list-container"></div>
  <div class="settings-link"><a onclick="showSetup()">&#9881; 設定を変更する</a></div>
</div>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="spinner-box">
    <div class="spinner"></div>
    <p id="loading-text">読み込み中...</p>
  </div>
</div>
<div id="toast"></div>

<script>
const CATEGORIES = [
  { id: 'maru', label: '丸）', items: ['丸）カツオ','丸）アナゴ（活）','丸）タコ（活）'] },
  { id: 'naka', label: '中）', items: ['中）ホタルイカ','中）殻付きホタテ'] },
  { id: 'ki',   label: '貴）', items: ['貴）サワラ','貴）キンメダイ','貴）サヨリ','貴）サゴシ'] },
  { id: 'e',    label: 'え）', items: ['え）マグロ'] }
];

let GAS_URL = '', SHEET_ID = '', currentTab = 'maru';
// sheetData: { fishName: [ {row, code, store, qty, price, shiirePrice}, ... ] }
let sheetData = {};

// ===== SETUP =====
function saveSetup() {
  const sid = document.getElementById('input-sheet-id').value.trim();
  const gurl = document.getElementById('input-gas-url').value.trim();
  if (!sid || !gurl) { showToast('両方の項目を入力してください'); return; }
  localStorage.setItem('shiire_sid', sid);
  localStorage.setItem('shiire_gas', gurl);
  SHEET_ID = sid; GAS_URL = gurl;
  startApp();
}
function showSetup() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}
function loadSetup() {
  SHEET_ID = localStorage.getItem('shiire_sid') || '';
  GAS_URL  = localStorage.getItem('shiire_gas')  || '';
  if (SHEET_ID && GAS_URL) {
    document.getElementById('input-sheet-id').value = SHEET_ID;
    document.getElementById('input-gas-url').value  = GAS_URL;
    startApp();
  }
}

// ===== START =====
function startApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-screen').style.display  = 'block';
  const now = new Date();
  const m = now.getMonth()+1, d = now.getDate();
  document.getElementById('current-sheet-name').textContent = '仕入表' + m + '/' + d;
  document.getElementById('current-date').textContent = now.getFullYear() + '年' + m + '月' + d + '日';
  buildTabs();
  loadSheetData();
}

// ===== TABS =====
function buildTabs() {
  const c = document.getElementById('tabs-container');
  c.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (cat.id === currentTab ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => switchTab(cat.id);
    c.appendChild(btn);
  });
}
function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', CATEGORIES[i].id === id);
  });
  renderList();
}

// ===== LOAD DATA =====
async function loadSheetData() {
  showLoading('読み込み中...');
  const sheetName = document.getElementById('current-sheet-name').textContent;
  try {
    const url = GAS_URL + '?action=read&sheetId=' + encodeURIComponent(SHEET_ID) + '&sheetName=' + encodeURIComponent(sheetName);
    const res  = await fetch(url);
    const json = await res.json();
    if (json.error) { showToast('エラー: ' + json.error); hideLoading(); return; }

    // Group by fish name — multiple stores per fish
    sheetData = {};
    (json.rows || []).forEach(r => {
      if (!sheetData[r.name]) sheetData[r.name] = [];
      sheetData[r.name].push(r);
    });

    renderList();
    showToast('読み込み完了');
  } catch(e) {
    showToast('通信エラー: ' + e.message);
  }
  hideLoading();
}

// ===== RENDER =====
function renderList() {
  const cat = CATEGORIES.find(c => c.id === currentTab);
  const container = document.getElementById('fish-list-container');
  container.innerHTML = '';
  if (!cat) return;

  cat.items.forEach(fishName => {
    const stores = sheetData[fishName] || [];
    const filledCount = stores.filter(s => s.qty !== null && s.qty !== '').length;
    const hasFilled = filledCount > 0;

    const card = document.createElement('div');
    card.className = 'fish-card' + (hasFilled ? ' has-filled' : '');
    card.id = 'card-' + fishName;

    const summary = stores.length === 0
      ? 'シートに未登録'
      : stores.length + '店舗 / ' + filledCount + '件入力済';

    let storesHTML = '';
    if (stores.length === 0) {
      storesHTML = '<div style="padding:12px 16px;font-size:13px;color:#f57c00;">&#9888; このシートに該当行が見つかりません</div>';
    } else {
      storesHTML = '<div class="store-list">' + stores.map((s, idx) => {
        const isFilled = s.qty !== null && s.qty !== '';
        const fVal = s.qty !== null ? s.qty : '';
        const hVal = s.price !== null ? s.price : '';
        const iVal = (fVal !== '' && hVal !== '') ? Math.round(parseFloat(fVal) * parseFloat(hVal) * 100) / 100 : '';
        const storeKey = fishName + '_' + idx;
        return `
          <div class="store-row${isFilled ? ' filled' : ''}" id="storerow-${storeKey}">
            <div class="store-header" >
              <span class="store-name-text">${s.code} ${s.store}</span>
              <span class="store-badge ${isFilled ? 'badge-filled' : 'badge-empty'}" id="sbadge-${storeKey}">
                ${isFilled ? '✓ 入力済' : '未入力'}
              </span>
            </div>
            <div class="store-input-area open" id="sinput-${storeKey}">
              <div class="input-grid">
                <div class="field">
                  <label>数量（F列）</label>
                  <input type="number" id="sf-${storeKey}" inputmode="decimal"
                    value="${fVal}" placeholder="0">
                </div>
                <div class="field">
                  <label>単価（H列）</label>
                  <input type="number" id="sh-${storeKey}" inputmode="decimal"
                    value="${hVal}" placeholder="0">
                </div>
                <div class="field">
                  <label>仕入単価（I列）</label>
                  <input type="number" id="si-${storeKey}" inputmode="decimal"
                    value="${iVal}" placeholder="0">
                </div>
              </div>
              <button class="btn-save" onclick="saveStore('${fishName}', ${idx}, '${storeKey}')">
                スプレッドシートに保存
              </button>
              <div class="save-msg" id="smsg-${storeKey}"></div>
            </div>
          </div>`;
      }).join('') + '</div>';
    }

    card.innerHTML = `
      <div class="fish-header" onclick="toggleFish('${fishName}')">
        <div class="fish-info">
          <div class="fish-name">${fishName}</div>
          <div class="fish-summary">${summary}</div>
        </div>
        <span class="fish-arrow" id="farrow-${fishName}">&#9660;</span>
      </div>
      <div class="fish-body open" id="fbody-${fishName}">
        ${storesHTML}
      </div>`;

    container.appendChild(card);
  });
}

// ===== TOGGLE =====
function toggleFish(name) {
  const body  = document.getElementById('fbody-' + name);
  const arrow = document.getElementById('farrow-' + name);
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open', isOpen);
}
function toggleStore(key) {
  const area = document.getElementById('sinput-' + key);
  if (!area) return;
  area.classList.toggle('open');
  if (area.classList.contains('open')) {
    setTimeout(() => {
      const inp = document.getElementById('sf-' + key);
      if (inp) inp.focus();
    }, 100);
  }
}

// ===== CALC AUTO =====
function calcStoreAuto(key) {
  const f = parseFloat(document.getElementById('sf-' + key).value) || 0;
  const h = parseFloat(document.getElementById('sh-' + key).value) || 0;
  const i = document.getElementById('si-' + key);
  i.value = (f && h) ? Math.round(f * h * 100) / 100 : '';
}

// ===== SAVE =====
async function saveStore(fishName, idx, key) {
  const storeData = (sheetData[fishName] || [])[idx];
  if (!storeData) { showToast('データが見つかりません'); return; }

  const fVal = document.getElementById('sf-' + key).value;
  const hVal = document.getElementById('sh-' + key).value;
  const iVal = document.getElementById('si-' + key).value;

  if (fVal === '' && hVal === '') { showToast('数量または単価を入力してください'); return; }

  const btn = document.querySelector('#sinput-' + key + ' .btn-save');
  const msg = document.getElementById('smsg-' + key);
  btn.disabled = true;
  btn.textContent = '保存中...';
  msg.textContent = '';

  try {
    const payload = {
      action: 'write',
      sheetId: SHEET_ID,
      sheetName: document.getElementById('current-sheet-name').textContent,
      row: storeData.row,
      f: fVal !== '' ? fVal : null,
      h: hVal !== '' ? hVal : null,
      i: iVal !== '' ? iVal : null
    };
    const res  = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain' } });
    const json = await res.json();

    if (json.success) {
      msg.textContent = '✓ 保存しました！';
      msg.className = 'save-msg ok';
      storeData.qty   = fVal;
      storeData.price = hVal;
      // update UI
      const row = document.getElementById('storerow-' + key);
      const badge = document.getElementById('sbadge-' + key);
      if (row)   row.classList.add('filled');
      if (badge) { badge.textContent = '✓ 入力済'; badge.className = 'store-badge badge-filled'; }
      // update card summary
      const stores = sheetData[fishName] || [];
      const filledCount = stores.filter(s => s.qty !== null && s.qty !== '').length;
      const cardEl = document.getElementById('card-' + fishName);
      if (cardEl) {
        cardEl.classList.add('has-filled');
        const summaryEl = cardEl.querySelector('.fish-summary');
        if (summaryEl) summaryEl.textContent = stores.length + '店舗 / ' + filledCount + '件入力済';
      }
      showToast(storeData.store + ' の ' + fishName + ' を保存しました ✓');
    } else {
      msg.textContent = 'エラー: ' + (json.error || '不明');
      msg.className = 'save-msg err';
    }
  } catch(e) {
    msg.textContent = '通信エラー: ' + e.message;
    msg.className = 'save-msg err';
  }

  btn.disabled = false;
  btn.textContent = 'スプレッドシートに保存';
}

// ===== HELPERS =====
function showLoading(t) { document.getElementById('loading-text').textContent = t; document.getElementById('loading-overlay').classList.add('show'); }
function hideLoading()  { document.getElementById('loading-overlay').classList.remove('show'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

loadSetup();
</script>
</body>
</html>
